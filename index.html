<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>Baba — May 16</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            height: 100%;
            font-size: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e8e0d4;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Cinematic background */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(139, 90, 43, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(184, 134, 11, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(139, 90, 43, 0.06) 0%, transparent 50%),
                #0a0a0a;
        }

        /* Gold line accents */
        .top-line, .bottom-line {
            position: fixed;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(184, 134, 11, 0.4) 20%, rgba(184, 134, 11, 0.4) 80%, transparent 100%);
            z-index: 10;
        }

        .top-line { top: 0; }
        .bottom-line { bottom: 0; background: linear-gradient(90deg, transparent 0%, rgba(184, 134, 11, 0.15) 50%, transparent 100%); }

        /* Ambient orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0;
            animation: orbDrift 20s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        .orb-1 {
            width: min(400px, 60vw);
            height: min(400px, 60vw);
            background: rgba(184, 134, 11, 0.06);
            top: -10%;
            left: 10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: min(300px, 45vw);
            height: min(300px, 45vw);
            background: rgba(139, 90, 43, 0.05);
            bottom: 10%;
            right: 15%;
            animation-delay: -7s;
        }

        .orb-3 {
            width: min(250px, 38vw);
            height: min(250px, 38vw);
            background: rgba(184, 134, 11, 0.04);
            top: 40%;
            right: -5%;
            animation-delay: -14s;
        }

        @keyframes orbDrift {
            0%, 100% { opacity: 0; transform: translate(0, 0) scale(1); }
            25% { opacity: 1; transform: translate(30px, -20px) scale(1.1); }
            50% { opacity: 0.6; transform: translate(-20px, 30px) scale(0.9); }
            75% { opacity: 1; transform: translate(40px, 10px) scale(1.05); }
        }

        /* Main content */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 1000px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* Brand mark */
        .brand-mark {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(0.55rem, 1.5vw, 0.65rem);
            font-weight: 400;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: rgba(184, 134, 11, 0.5);
            margin-bottom: clamp(2.5rem, 6vh, 4rem);
            opacity: 0;
            animation: fadeUp 1.2s ease-out 0.3s forwards;
        }

        /* The name */
        .name {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3.5rem, 14vw, 10rem);
            font-weight: 300;
            letter-spacing: 0.15em;
            color: #e8e0d4;
            line-height: 1;
            margin-bottom: 0.3rem;
            opacity: 0;
            animation: fadeUp 1.4s ease-out 0.6s forwards;
            position: relative;
        }

        .name::after {
            content: '';
            position: absolute;
            bottom: -0.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(184, 134, 11, 0.5), transparent);
            opacity: 0;
            animation: lineReveal 1s ease-out 1.8s forwards;
        }

        @keyframes lineReveal {
            from { opacity: 0; width: 0; }
            to { opacity: 1; width: 60px; }
        }

        /* Date */
        .date {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(0.8rem, 2.5vw, 1.2rem);
            font-weight: 300;
            font-style: italic;
            color: rgba(232, 224, 212, 0.5);
            letter-spacing: 0.3em;
            margin-bottom: clamp(3rem, 8vh, 5rem);
            opacity: 0;
            animation: fadeUp 1.2s ease-out 1s forwards;
        }

        /* Countdown */
        .countdown {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: clamp(1.2rem, 4vw, 5rem);
            margin-bottom: clamp(3rem, 8vh, 5rem);
            opacity: 0;
            animation: fadeUp 1.2s ease-out 1.4s forwards;
            flex-wrap: nowrap;
            width: 100%;
            max-width: 700px;
        }

        .unit {
            text-align: center;
            flex: 1;
            min-width: 0;
        }

        .unit-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.2rem, 10vw, 6rem);
            font-weight: 300;
            color: #e8e0d4;
            line-height: 1;
            display: block;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .unit-label {
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.5rem, 1.8vw, 0.6rem);
            font-weight: 300;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: rgba(184, 134, 11, 0.6);
            margin-top: clamp(0.5rem, 1.5vh, 0.8rem);
            display: block;
        }

        .unit-divider {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.5rem, 5vw, 3rem);
            font-weight: 200;
            color: rgba(184, 134, 11, 0.3);
            margin-top: 0.3rem;
            flex-shrink: 0;
        }

        /* Tagline */
        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(0.75rem, 2vw, 1.1rem);
            font-weight: 300;
            font-style: italic;
            color: rgba(232, 224, 212, 0.35);
            letter-spacing: 0.15em;
            opacity: 0;
            animation: fadeUp 1.2s ease-out 1.8s forwards;
            padding: 0 1rem;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Birthday celebration */
        .celebration {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #0a0a0a;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 2s ease-out;
            padding: 2rem;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .celebration .brand-mark {
            margin-bottom: clamp(2rem, 5vh, 3rem);
            animation: fadeUp 1.5s ease-out 0.5s forwards;
        }

        .celebration .name {
            font-size: clamp(2.5rem, 12vw, 8rem);
            margin-bottom: 1rem;
            animation: fadeUp 1.5s ease-out 0.8s forwards;
        }

        .celebration .name::after {
            display: none;
        }

        .celebration .wish {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(0.9rem, 3vw, 1.5rem);
            font-weight: 300;
            font-style: italic;
            color: rgba(232, 224, 212, 0.5);
            letter-spacing: 0.2em;
            line-height: 1.6;
            opacity: 0;
            animation: fadeUp 1.5s ease-out 1.2s forwards;
            max-width: 500px;
        }

        .celebration .year {
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.55rem, 1.5vw, 0.6rem);
            font-weight: 300;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: rgba(184, 134, 11, 0.4);
            margin-top: clamp(2rem, 5vh, 3rem);
            opacity: 0;
            animation: fadeUp 1.5s ease-out 1.6s forwards;
        }

        /* Gold dust */
        .dust {
            position: fixed;
            width: 2px;
            height: 2px;
            background: rgba(184, 134, 11, 0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: dustFall linear infinite;
        }

        @keyframes dustFall {
            0% { transform: translateY(-10px) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100vh) translateX(20px); opacity: 0; }
        }

        /* Mobile landscape adjustments */
        @media (max-height: 500px) and (orientation: landscape) {
            .brand-mark { margin-bottom: 1.5rem; }
            .date { margin-bottom: 2rem; }
            .countdown { margin-bottom: 2rem; }
            .unit-value { font-size: clamp(2rem, 12vh, 4rem); }
            .unit-label { margin-top: 0.3rem; }
        }

        /* Small phones */
        @media (max-width: 360px) {
            .countdown { gap: 0.8rem; }
            .unit-value { font-size: 2rem; }
            .unit-label { letter-spacing: 0.2em; font-size: 0.45rem; }
            .unit-divider { font-size: 1.2rem; }
        }

        /* Large tablets */
        @media (min-width: 768px) and (max-width: 1024px) {
            .name { font-size: 8rem; }
            .unit-value { font-size: 5rem; }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .brand-mark, .name, .date, .countdown, .tagline,
            .celebration .brand-mark, .celebration .name,
            .celebration .wish, .celebration .year {
                animation: none;
                opacity: 1;
            }
            .name::after { animation: none; opacity: 1; width: 60px; }
            .orb { animation: none; opacity: 0.5; }
            .dust { animation: none; opacity: 0.3; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="bg-layer"></div>
    <div class="top-line"></div>
    <div class="bottom-line"></div>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div id="dust-container"></div>

    <!-- Countdown view -->
    <div class="content" id="countdown-view">
        <div class="brand-mark">An Occasion</div>
        <div class="name">Baba</div>
        <div class="date">May the Sixteenth</div>

        <div class="countdown">
            <div class="unit">
                <span class="unit-value" id="days">00</span>
                <span class="unit-label">Days</span>
            </div>
            <div class="unit-divider">·</div>
            <div class="unit">
                <span class="unit-value" id="hours">00</span>
                <span class="unit-label">Hours</span>
            </div>
            <div class="unit-divider">·</div>
            <div class="unit">
                <span class="unit-value" id="minutes">00</span>
                <span class="unit-label">Minutes</span>
            </div>
            <div class="unit-divider">·</div>
            <div class="unit">
                <span class="unit-value" id="seconds">00</span>
                <span class="unit-label">Seconds</span>
            </div>
        </div>

        <div class="tagline">Awaiting the moment</div>
    </div>

    <!-- Celebration view -->
    <div class="celebration" id="celebration-view">
        <div class="brand-mark">An Occasion</div>
        <div class="name">Happy Birthday</div>
        <div class="wish">To one who deserves nothing less than everything</div>
        <div class="year">MMXXVI</div>
    </div>

    <script>
        // Gold dust
        function createDust() {
            const container = document.getElementById('dust-container');
            for (let i = 0; i < 25; i++) {
                const dust = document.createElement('div');
                dust.className = 'dust';
                dust.style.left = Math.random() * 100 + '%';
                dust.style.animationDuration = (Math.random() * 15 + 10) + 's';
                dust.style.animationDelay = Math.random() * 20 + 's';
                const size = Math.random() * 2 + 1;
                dust.style.width = size + 'px';
                dust.style.height = size + 'px';
                container.appendChild(dust);
            }
        }

        // Countdown
        function updateCountdown() {
            const now = new Date();
            const currentYear = now.getFullYear();
            let target = new Date(currentYear, 4, 16, 0, 0, 0);

            if (now > target) {
                target = new Date(currentYear + 1, 4, 16, 0, 0, 0);
            }

            const diff = target - now;

            if (diff <= 0) {
                showCelebration();
                return;
            }

            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            document.getElementById('days').textContent = String(d).padStart(2, '0');
            document.getElementById('hours').textContent = String(h).padStart(2, '0');
            document.getElementById('minutes').textContent = String(m).padStart(2, '0');
            document.getElementById('seconds').textContent = String(s).padStart(2, '0');
        }

        function showCelebration() {
            document.getElementById('countdown-view').style.display = 'none';
            document.getElementById('celebration-view').style.display = 'flex';
        }

        createDust();
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
